
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pasta Fusion 2048</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7e6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    .top-tabs {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
    }

    .tab {
      text-decoration: none;
      color: #fff;
      background: #b33939;
      border: 1px solid #8e2d2d;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 14px;
      display: inline-block;
    }

    .tab:hover {
      background: #8e2d2d;
    }

    h1 {
      margin-bottom: 5px;
      color: #b33939;
    }

    #score {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }

    #game-board {
      width: 320px;
      height: 320px;
      background: #d1a97a;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 8px;
      padding: 10px;
      box-sizing: border-box;
    }

    .tile {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }

    .empty {
      background: rgba(255, 255, 255, 0.25);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #b33939;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #8e2d2d;
    }

    #message {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="top-tabs">
    <a class="tab" href="scratch.html">Back to Scratch</a>
  </div>

  <h1>🍝 Pasta Fusion 2048 🍝</h1>
  <div id="score">Score: 0</div>
  <div id="game-board"></div>
  <button onclick="resetGame()">Restart</button>
  <div id="message"></div>

  <script>
    const boardSize = 4;
    let board = [];
    let score = 0;

    const pastaLevels = [
      "🍜 Spaghetti",
      "🌀 Penne",
      "🧄 Rigatoni",
      "🥟 Ravioli",
      "🧀 Lasagna",
      "🍝 Carbonara",
      "🍤 Alfredo",
      "⭐ Nonna's Special"
    ];

    const tileColors = [
      "#f39c12",
      "#e67e22",
      "#d35400",
      "#c0392b",
      "#8e44ad",
      "#2980b9",
      "#27ae60",
      "#2c3e50"
    ];

    function initBoard() {
      board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
      score = 0;
      document.getElementById("message").textContent = "";
      addRandomTile();
      addRandomTile();
      updateBoard();
    }

    function addRandomTile() {
      let emptyTiles = [];
      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          if (board[r][c] === 0) emptyTiles.push({r, c});
        }
      }

      if (emptyTiles.length === 0) return;

      let {r, c} = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
      board[r][c] = Math.random() < 0.9 ? 1 : 2;
    }

    function updateBoard() {
      const gameBoard = document.getElementById("game-board");
      gameBoard.innerHTML = "";

      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          const value = board[r][c];
          const tile = document.createElement("div");

          if (value === 0) {
            tile.className = "tile empty";
            tile.textContent = "";
          } else {
            tile.className = "tile";
            tile.textContent = pastaLevels[value - 1];
            tile.style.background = tileColors[value - 1];
          }

          gameBoard.appendChild(tile);
        }
      }

      document.getElementById("score").textContent = "Score: " + score;

      if (checkWin()) {
        document.getElementById("message").textContent = "🎉 You made Nonna proud! You win!";
      } else if (checkGameOver()) {
        document.getElementById("message").textContent = "💀 Game Over! The pasta kitchen is closed!";
      }
    }

    function slide(row) {
      let arr = row.filter(val => val !== 0);

      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i]++;
          score += arr[i] * 10;
          arr[i + 1] = 0;
        }
      }

      arr = arr.filter(val => val !== 0);

      while (arr.length < boardSize) arr.push(0);

      return arr;
    }

    function rotateBoard() {
      let newBoard = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          newBoard[c][boardSize - 1 - r] = board[r][c];
        }
      }
      board = newBoard;
    }

    function moveLeft() {
      let moved = false;
      for (let r = 0; r < boardSize; r++) {
        let original = [...board[r]];
        let newRow = slide(board[r]);
        board[r] = newRow;
        if (original.toString() !== newRow.toString()) moved = true;
      }
      return moved;
    }

    function move(direction) {
      let moved = false;

      if (direction === "left") {
        moved = moveLeft();
      } else if (direction === "up") {
        rotateBoard();
        rotateBoard();
        rotateBoard();
        moved = moveLeft();
        rotateBoard();
      } else if (direction === "right") {
        rotateBoard();
        rotateBoard();
        moved = moveLeft();
        rotateBoard();
        rotateBoard();
      } else if (direction === "down") {
        rotateBoard();
        moved = moveLeft();
        rotateBoard();
        rotateBoard();
        rotateBoard();
      }

      if (moved) {
        addRandomTile();
        updateBoard();
      }
    }

    function checkWin() {
      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          if (board[r][c] === pastaLevels.length) return true;
        }
      }
      return false;
    }

    function checkGameOver() {
      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          if (board[r][c] === 0) return false;
          if (c < boardSize - 1 && board[r][c] === board[r][c + 1]) return false;
          if (r < boardSize - 1 && board[r][c] === board[r + 1][c]) return false;
        }
      }
      return true;
    }

    function resetGame() {
      initBoard();
    }

    document.addEventListener("keydown", (e) => {
      if (checkWin() || checkGameOver()) return;

      if (e.key === "ArrowLeft") move("left");
      if (e.key === "ArrowRight") move("right");
      if (e.key === "ArrowUp") move("up");
      if (e.key === "ArrowDown") move("down");
    });

    initBoard();
  </script>

</body>
</html>
